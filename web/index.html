<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FingerMOBA</title>
<style>
  html,body{margin:0;height:100%;background:#070d07;overflow:hidden;
    font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none}
  #game{width:100vw;height:100vh}
  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#9fe07a;
    font-size:14px;letter-spacing:.1em;z-index:5}
</style>
</head>
<body>
<div id="boot">载入中…</div>
<div id="game"></div>
<script>
// Phaser 优先走国内 CDN(七牛 staticfile,国内快),失败回退到本站自托管副本;两者都就绪后再加载游戏。
(function () {
  function loadGame() { var g = document.createElement('script'); g.src = 'game.js'; document.body.appendChild(g); }
  function fromLocal() { var f = document.createElement('script'); f.src = 'vendor/phaser.min.js'; f.onload = loadGame; f.onerror = loadGame; document.head.appendChild(f); }
  var p = document.createElement('script');
  p.src = 'https://cdn.staticfile.org/phaser/3.80.1/phaser.min.js';
  p.onload = loadGame;
  p.onerror = fromLocal;
  document.head.appendChild(p);
})();
</script>
</body>
</html>
