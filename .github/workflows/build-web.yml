name: Build Web + Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.3"

jobs:
  build:
    name: Export HTML5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install export templates
        run: |
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/tmpl
          TMPL_DIR="$HOME/.local/share/godot/export_templates/$(cat /tmp/tmpl/templates/version.txt)"
          mkdir -p "$TMPL_DIR"
          mv /tmp/tmpl/templates/* "$TMPL_DIR/"
          ls "$TMPL_DIR/" | grep -i web || echo "WARN: no web template found"

      - name: Import project
        run: timeout 120 godot --headless --editor --quit 2>&1 || true

      - name: Export Web (HTML5)
        run: |
          mkdir -p build
          godot --headless --verbose --export-release "Web" "$GITHUB_WORKSPACE/build/index.html" 2>&1
          echo "--- build/ ---"; ls -la build/
          test -f build/index.html || { echo "ERROR: web export produced no index.html"; exit 1; }

      - name: Add 404 fallback (SPA)
        run: cp build/index.html build/404.html || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
