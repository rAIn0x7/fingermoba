name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot environment
        run: |
          echo "HOME=$HOME, ANDROID_HOME=$ANDROID_HOME"
          # Check container keystore
          ls /root/debug.keystore 2>/dev/null && echo "container keystore OK" || echo "no container keystore"

          # Find Java home
          JAVA_BASE=$(dirname "$(dirname "$(readlink -f "$(which java)")")")
          echo "Java: $JAVA_BASE"

          # Copy export templates from container root to runner home
          mkdir -p "$HOME/.local/share/godot/export_templates"
          cp -r /root/.local/share/godot/export_templates/4.3.stable \
            "$HOME/.local/share/godot/export_templates/4.3.stable"
          ls "$HOME/.local/share/godot/export_templates/4.3.stable/" | grep android

          # Write editor settings — filename MUST be editor_settings-4.3.tres (minor version)
          mkdir -p "$HOME/.config/godot"
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/java_sdk_path = "%s"\nexport/android/debug_keystore = "%s"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
            "${ANDROID_HOME:-/usr/lib/android-sdk}" \
            "$JAVA_BASE" \
            "/root/debug.keystore" \
            > "$HOME/.config/godot/editor_settings-4.3.tres"
          echo "=== editor_settings-4.3.tres ==="
          cat "$HOME/.config/godot/editor_settings-4.3.tres"

      - name: Import project
        run: |
          timeout 120 godot --headless --editor --quit 2>&1 || true
          ls .godot/ 2>/dev/null || echo "No .godot dir"

      - name: Build Debug APK
        run: |
          mkdir -p builds
          godot --headless --verbose --export-debug "Android" "builds/fingermoba.apk" 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fingermoba-debug-${{ github.run_number }}
          path: builds/fingermoba.apk
          retention-days: 30

      - name: Create GitHub Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: builds/fingermoba.apk
          name: FingerMOBA ${{ github.ref_name }}
