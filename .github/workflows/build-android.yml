name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and build tools
        run: |
          sdkmanager --install \
            "ndk;25.1.8937393" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q \
            "https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Godot export templates
        run: |
          TMPL_DIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TMPL_DIR"
          wget -q \
            "https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" \
            -O templates.tpz
          unzip -q templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "$TMPL_DIR/"
          echo "Installed templates:"
          ls "$TMPL_DIR/" | grep -i android

      - name: Generate debug keystore
        run: |
          keytool -keyalg RSA -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 \
            -deststoretype pkcs12
          echo "Keystore created at: $GITHUB_WORKSPACE/debug.keystore"
          ls -lh "$GITHUB_WORKSPACE/debug.keystore"

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
            "$ANDROID_HOME" \
            "$GITHUB_WORKSPACE/debug.keystore" \
            > ~/.config/godot/editor_settings-4.tres
          echo "=== Editor settings ==="
          cat ~/.config/godot/editor_settings-4.tres

      - name: Patch export preset keystore path
        run: |
          sed -i "s|keystore/debug=\"debug.keystore\"|keystore/debug=\"$GITHUB_WORKSPACE/debug.keystore\"|" export_presets.cfg
          echo "=== export_presets.cfg keystore line ==="
          grep keystore export_presets.cfg

      - name: Verify tools
        run: |
          echo "=== jarsigner ==="
          which jarsigner || echo "jarsigner not found"
          echo "=== zipalign ==="
          find "$ANDROID_HOME/build-tools" -name zipalign 2>/dev/null | head -1 || echo "zipalign not found"
          echo "=== aapt ==="
          find "$ANDROID_HOME/build-tools" -name aapt 2>/dev/null | head -1 || echo "aapt not found"

      - name: Import project
        run: |
          godot --headless --import --quit-after 5 2>&1 || true

      - name: Build Debug APK
        run: |
          mkdir -p builds
          godot --headless --verbose --export-debug "Android" "$GITHUB_WORKSPACE/builds/fingermoba.apk" 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fingermoba-debug-${{ github.run_number }}
          path: builds/fingermoba.apk
          retention-days: 30

      - name: Create GitHub Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: builds/fingermoba.apk
          name: FingerMOBA ${{ github.ref_name }}
