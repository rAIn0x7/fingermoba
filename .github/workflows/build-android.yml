name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot environment from container
        run: |
          echo "HOME=$HOME"
          # Copy export templates from container's root home to runner home
          mkdir -p "$HOME/.local/share/godot/export_templates"
          cp -r /root/.local/share/godot/export_templates/4.3.stable \
            "$HOME/.local/share/godot/export_templates/4.3.stable"
          echo "=== Android templates ==="
          ls "$HOME/.local/share/godot/export_templates/4.3.stable/" | grep android
          # Copy editor settings (has Android SDK, NDK, Java, keystore paths)
          mkdir -p "$HOME/.config"
          cp -r /root/.config/godot "$HOME/.config/godot"
          echo "=== Editor settings ==="
          cat "$HOME/.config/godot/editor_settings-4.tres"

      - name: Import project
        run: |
          timeout 120 godot --headless --editor --quit 2>&1 || true
          ls .godot/ 2>/dev/null || echo "No .godot dir"

      - name: Build Debug APK
        run: |
          mkdir -p builds
          godot --headless --verbose --export-debug "Android" "builds/fingermoba.apk" 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fingermoba-debug-${{ github.run_number }}
          path: builds/fingermoba.apk
          retention-days: 30

      - name: Create GitHub Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: builds/fingermoba.apk
          name: FingerMOBA ${{ github.ref_name }}
