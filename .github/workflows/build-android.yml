name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
      env:
        HOME: /root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect container environment
        run: |
          echo "HOME=$HOME"
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "JAVA_HOME=${JAVA_HOME}"
          echo "=== /root/.config/godot ==="
          ls /root/.config/godot/ 2>/dev/null || echo "no godot config dir"
          echo "=== /root/.config/godot/editor_settings-4.tres ==="
          cat /root/.config/godot/editor_settings-4.tres 2>/dev/null || echo "no editor settings"
          echo "=== templates ==="
          ls /root/.local/share/godot/export_templates/4.3.stable/ 2>/dev/null | grep android || echo "no templates"
          echo "=== Java ==="
          java -version 2>&1 | head -1 || echo "java not in PATH"
          find /usr /opt -name "keytool" 2>/dev/null | head -3 || echo "keytool not found"
          echo "=== Android SDK ==="
          ls "${ANDROID_HOME:-/usr/lib/android-sdk}/" 2>/dev/null | head -5 || echo "sdk not found"

      - name: Setup editor settings
        run: |
          # Find Java home (try common paths)
          JAVA_BASE=""
          for p in "$JAVA_HOME" "/usr/lib/jvm/java-17-openjdk-amd64" "/usr/lib/jvm/java-17-openjdk-aarch64" "$(dirname "$(dirname "$(readlink -f "$(which java)" 2>/dev/null)" 2>/dev/null)" 2>/dev/null)"; do
            if [ -n "$p" ] && [ -f "$p/bin/keytool" ]; then
              JAVA_BASE="$p"
              break
            fi
          done
          echo "Using Java at: $JAVA_BASE"

          SDK="${ANDROID_HOME:-/usr/lib/android-sdk}"
          KEYSTORE="/root/debug.keystore"

          mkdir -p /root/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/java_sdk_path = "%s"\nexport/android/debug_keystore = "%s"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
            "$SDK" "$JAVA_BASE" "$KEYSTORE" \
            > /root/.config/godot/editor_settings-4.tres
          echo "=== Created editor settings ==="
          cat /root/.config/godot/editor_settings-4.tres

      - name: Import project
        run: |
          timeout 120 godot --headless --editor --quit 2>&1 || true
          ls .godot/ 2>/dev/null || echo "No .godot dir"

      - name: Build Debug APK
        run: |
          mkdir -p builds
          godot --headless --verbose --export-debug "Android" "builds/fingermoba.apk" 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fingermoba-debug-${{ github.run_number }}
          path: builds/fingermoba.apk
          retention-days: 30

      - name: Create GitHub Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: builds/fingermoba.apk
          name: FingerMOBA ${{ github.ref_name }}
