name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import project
        run: |
          timeout 120 godot --headless --editor --quit 2>&1 || true
          echo "=== .godot dir ==="
          ls .godot/ 2>/dev/null || echo "No .godot dir"

      - name: Build Debug APK
        run: |
          mkdir -p builds
          godot --headless --verbose --export-debug "Android" "builds/fingermoba.apk" 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fingermoba-debug-${{ github.run_number }}
          path: builds/fingermoba.apk
          retention-days: 30

      - name: Create GitHub Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: builds/fingermoba.apk
          name: FingerMOBA ${{ github.ref_name }}
